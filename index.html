<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>

<title>Weekly Human Checklist</title>
<style>
:root{
  --bg:23,22,26;--panel:33,31,38;--panel2:28,27,33;--accent:201,168,110;

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:rgb(var(--bg));color:rgb(var(--text));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh}
button,input{font-family:inherit}button{cursor:pointer;border:0;background:none;color:inherit}

#scene:before{content:"";position:absolute;inset:0;background:
 radial-gradient(circle at 78% 14%,rgba(var(--accent),.28),transparent 18%),
 radial-gradient(circle at 20% 60%,rgba(var(--text),.08),transparent 24%),
 linear-gradient(rgba(var(--bg),.14),rgba(var(--bg),.62))}
#scene:after{content:"";position:absolute;inset:0;opacity:.5;background:
 linear-gradient(90deg,transparent 0 18%,rgba(var(--text),.035) 18.3% 18.6%,transparent 19% 58%,rgba(var(--text),.03) 58.3% 58.6%,transparent 59%),
 radial-gradient(circle at 14% 33%,rgba(var(--text),.5) 0 1px,transparent 1.8px),
 radial-gradient(circle at 74% 44%,rgba(var(--accent),.7) 0 1.2px,transparent 2px),
 radial-gradient(circle at 48% 20%,rgba(var(--text),.28) 0 1px,transparent 1.8px);
 background-size:auto,90px 120px,130px 170px,170px 220px}
body.w-rain #scene:after{background:
 linear-gradient(168deg,transparent 0 76%,rgba(var(--text),.18) 78%,transparent 84%),
 linear-gradient(90deg,transparent 0 18%,rgba(var(--text),.035) 18.3% 18.6%,transparent 19% 58%,rgba(var(--text),.03) 58.3% 58.6%,transparent 59%);
 background-size:8px 78px,auto;animation:rain 1s linear infinite}
@keyframes rain{to{background-position:0 78px,0 0}}
body.p-dawn #scene{background:linear-gradient(rgb(88,80,87),rgb(35,31,38))}
body.p-day #scene{background:linear-gradient(rgb(78,82,92),rgb(38,36,42))}
body.p-dusk #scene{background:linear-gradient(rgb(65,54,65),rgb(31,27,34))}
.glass{background:rgba(var(--panel),.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(var(--text),.055)}
.soft{background:rgba(var(--panel),.34);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(var(--text),.045)}
#app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:28px 18px 44px}
.shadow{text-shadow:0 1px 8px rgba(var(--sky2),.85)}
.sub{color:rgb(var(--sub))}.muted{color:rgb(var(--faint))}
.round{border-radius:16px}.full{border-radius:999px}
.top{display:flex;align-items:flex-start;justify-content:space-between;margin:8px 0 16px}
.greet{font-size:24px;font-weight:650}.date{font-size:12px;margin-top:2px}.quote{font-size:13px;font-style:italic;margin-top:6px;color:rgb(var(--accent));text-align:left}
.weather{display:flex;align-items:center;gap:5px;padding:6px 10px;margin-top:4px;font-size:11px;text-transform:capitalize}
.spoons{padding:6px 10px;font-size:11px;font-weight:700;margin-top:6px}
.level{position:relative;display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:12px}
.ring{display:grid;place-items:center;width:52px;height:52px;border-radius:50%}.inner{display:flex;flex-direction:column;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:rgb(var(--panel2))}

.tabbar{display:flex;gap:6px;margin-bottom:16px}.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 0;border-radius:14px;font-size:12px;font-weight:700}
.pill{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;border-radius:14px}
.card{padding:16px;margin-bottom:16px}.row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:10px 12px;border-radius:14px}
.check{display:flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:8px;flex:0 0 auto}
.note{font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(var(--bg),.6);color:rgb(var(--sub))}
.secbtn{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px;padding:0 4px;color:rgb(var(--sub))}
.sec{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

.medal{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;margin-bottom:8px;font-weight:700}
input[type=date],input.sq{background:rgba(var(--bg),.5);color:rgb(var(--text));border:1px solid rgb(var(--line));border-radius:12px;padding:8px 10px;font-size:14px;outline:0}
input.sq{background:transparent;border:0;flex:1}.fx{position:absolute;right:16px;top:8px;font-weight:800;color:rgb(var(--accent));pointer-events:none;animation:floatUp .95s ease forwards}
.flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:16px;background:rgba(0,0,0,.5);animation:pop .4s ease;font-weight:800;color:rgb(var(--good))}
@keyframes floatUp{0%{opacity:0;transform:translateY(6px)}20%{opacity:1}100%{opacity:0;transform:translateY(-22px)}}@keyframes pop{0%{transform:scale(.6);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}

  .cal-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 12px}
  .cal-title{font-size:18px;font-weight:700}
  .cal-nav{display:flex;gap:6px}
  .cal-btn{border-radius:12px;padding:8px 10px;background:rgba(var(--text),.06);color:rgb(var(--sub));font-size:12px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-weekday{text-align:center;font-size:10px;color:rgb(var(--faint));font-weight:700;letter-spacing:.08em}
  .cal-day{position:relative;min-height:58px;border-radius:14px;padding:7px 6px;background:rgba(var(--text),.035);border:1px solid rgba(var(--text),.035);text-align:left}
  .cal-day.out{opacity:.38}
  .cal-day.today{border-color:rgb(var(--accent))}
  .cal-day.selected{background:rgb(var(--accent));color:rgb(var(--bg))}
  .cal-num{font-size:13px;font-weight:700}
  .cal-mini{position:absolute;left:6px;right:6px;bottom:6px;height:4px;border-radius:999px;background:rgba(var(--text),.08);overflow:hidden}

  .cal-dots{position:absolute;right:6px;top:7px;display:flex;gap:3px}

  .week-preview{display:flex;flex-direction:column;gap:6px}
  .week-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;background:rgba(var(--text),.035)}
  .week-date{width:54px;font-size:12px;font-weight:700}
  .week-main{flex:1;min-width:0}
  .week-main b{font-size:13px}
  .week-main span{display:block;font-size:11px;color:rgb(var(--faint));margin-top:2px}

</style>
<script>
window.addEventListener("error", function(e){
  var el = document.getElementById("app");
  if (el) {
    el.innerHTML = '<div class="glass round card" style="position:relative;z-index:1;margin:28px auto;max-width:420px"><div class="shadow greet">Something crashed.</div><p class="sub" style="font-size:13px;line-height:1.45">JavaScript error: ' + String(e.message).replace(/[<>&"]/g, "") + '</p></div>';
  }
});
</script>

 moon:{name:"Moonlit",cost:200,bg:"20,23,28",panel:"30,34,42",panel2:"25,28,35",accent:"169,183,198",good:"143,166,160",text:"230,234,240",sub:"147,160,174",faint:"90,102,114",line:"44,51,61",sky1:"35,46,60",sky2:"17,21,27"},
 linen:{name:"Warm Linen",cost:200,bg:"26,23,20",panel:"36,31,27",panel2:"30,26,22",accent:"203,176,138",good:"162,169,140",text:"237,231,222",sub:"160,150,138",faint:"107,97,87",line:"54,47,40",sky1:"51,41,31",sky2:"22,18,14"},
 sage:{name:"Conservatory",cost:300,bg:"21,24,21",panel:"31,36,31",panel2:"25,29,25",accent:"183,196,160",good:"157,180,142",text:"231,236,226",sub:"151,163,143",faint:"94,106,88",line:"44,53,44",sky1:"37,48,36",sky2:"18,22,17"}
};
const ACH=[

const QUOTES=["You woke up. That's a W.","Hydrate or diedrate.","Bare minimum is still a minimum. Respect.","Eat something that isn't just vibes.","Rest isn't lazy, it's a strategic cooldown.","Touch grass. Or don't. I'm a checklist, not a cop.","Small quest completed: existing today.","Feral is fine. Fed-and-watered feral is better.","One (1) responsible thing, then gremlin hours."];

let state={log:{},lastDose:KNOWN_DOSE,sideQuests:[{id:"sq1",label:""},{id:"sq2",label:""}],meta:{streak:0,maxStreak:0,lastActiveDate:null},spent:0,owned:["dusk"],active:"dusk",weather:{mode:"clear",userSet:false,temp:null},collapsed:{},periods:[],pilates:[],weekly:{},spoons:false};
let selected=today(),tab="day",quoteRoll=null,periodDraft=today(),prevLevel=null,calCursor=today().slice(0,7)+"-01";

function pad(n){return String(n).padStart(2,"0")}function today(){let d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function fromYmd(s){let p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2],12)}function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function addDays(s,n){let d=fromYmd(s);d.setDate(d.getDate()+n);return ymd(d)}function daysBetween(a,b){return Math.round((fromYmd(b)-fromYmd(a))/86400000)}

function prettyShort(s){return fromYmd(s).toLocaleDateString(undefined,{month:"short",day:"numeric"})}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function cum(L){return 100*(L-1)*L/2}function levelFromXp(xp){let L=1;while(cum(L+1)<=xp)L++;return L}
function codeToScene(c){return(c===0||c===1)?"clear":([2,3,45,48].includes(c)?"cloud":"rain")}
function greeting(){let h=new Date().getHours();return h<5?"Rest well":h<12?"Good morning":h<17?"Good afternoon":h<21?"Good evening":"Cozy night"}
function icon(name){const sv={check:'<path d="M20 6L9 17l-5-5"/>',flame:'<path d="M12 2s4 4 4 8a4 4 0 1 1-8 0c0-1 .5-2 1-3-2 1-3 3-3 5a6 6 0 0 0 12 0c0-5-6-10-6-10z"/>',pill:'<rect x="3" y="8" width="18" height="8" rx="4"/><path d="M12 8v8"/>',moon:'<path d="M21 12.8A8 8 0 1 1 11.2 3 6 6 0 0 0 21 12.8z"/>',cloud:'<path d="M17 17H7a4 4 0 1 1 1-8 5 5 0 0 1 9.6 1.4A3.5 3.5 0 0 1 17 17z"/>',rain:'<path d="M17 14H7a4 4 0 1 1 1-8 5 5 0 0 1 9.6 1.4A3.5 3.5 0 0 1 17 14z"/><path d="M8 19v2M12 19v2M16 19v2"/>',coins:'<circle cx="8" cy="8" r="5"/><path d="M16 8a5 5 0 1 1 0 8"/>',trophy:'<path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4zM7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3"/>',bag:'<path d="M6 8h12l-1 12H7L6 8zM9 8V6a3 3 0 0 1 6 0v2"/>',drop:'<path d="M12 3s6 6 6 10a6 6 0 0 1-12 0c0-4 6-10 6-10z"/>',chevD:'<path d="M6 9l6 6 6-6"/>',chevR:'<path d="M9 6l6 6-6 6"/>',reset:'<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',pilates:'<circle cx="12" cy="5" r="2"/><path d="M12 7v6M9 20l3-7 3 7M6 11l6 2 6-2"/>'}[name];return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${sv}</svg>`}

function load(){try{let d=JSON.parse(localStorage.getItem(STORE)||"null");if(d){state=Object.assign(state,d);if(!state.owned.includes("dusk"))state.owned.push("dusk")}}catch(e){}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function studyActiveFor(s){return daysBetween(s,SEM.start)<=0}
function isDoseDayFor(s){let diff=daysBetween(state.lastDose,s);return dow(s)===5&&diff>=0&&diff%DOSE_INTERVAL===0}
function ordered(){return[SECTIONS[0],HOME,SECTIONS[1],SECTIONS[2]]}
function normTask(t){return{id:t[0],label:t[1],note:t[2],onlyDay:t[3]}}
function visibleIdsFor(s){let dw=dow(s),out=[];ordered().forEach(sec=>{if(sec.key==="study"&&!studyActiveFor(s))return;sec.tasks.map(normTask).forEach(t=>{if(!t.onlyDay||t.onlyDay===dw)out.push(t.id)})});state.sideQuests.forEach(q=>{if(q.label.trim())out.push(q.id)});if(isDoseDayFor(s))out.push("med");return out}
function compute(){let earned=0,checks=0,doses=0,perfect=[];Object.keys(state.log).forEach(date=>{let ids=state.log[date]||[];ids.forEach(id=>{if(id==="med"){earned+=COIN_MED;doses++}else{earned+=COIN_TASK;checks++}});let vis=visibleIdsFor(date);if(vis.length&&vis.every(x=>ids.includes(x))){earned+=COIN_PERFECT;perfect.push(date)}});let wc={};perfect.forEach(d=>wc[weekStartOf(d)]=(wc[weekStartOf(d)]||0)+1);Object.keys(state.weekly||{}).forEach(w=>{let dn=state.weekly[w]||[];if(REFRESH.every(r=>dn.includes(r[0])))earned+=50});let level=levelFromXp(earned);return{earned,level,balance:earned-state.spent,intoLevel:earned-cum(level),forThis:cum(level+1)-cum(level),toNext:cum(level+1)-earned,stats:{checks,doses,perfectDays:perfect.length,perfectWeeks:Object.values(wc).filter(v=>v>=7).length,maxStreak:Math.max(state.meta.maxStreak||0,state.meta.streak||0),level}}}
function applyTheme(){let t=THEMES[state.active]||THEMES.dusk;Object.keys(t).forEach(k=>{if(k!=="name"&&k!=="cost")document.documentElement.style.setProperty("--"+k,t[k])})}
function phase(){let h=new Date().getHours();return h>=5&&h<8?"dawn":h>=8&&h<17?"day":h>=17&&h<20?"dusk":"night"}
function applyBody(){document.body.className="w-"+state.weather.mode+" p-"+phase()}
function bumpStreak(before,after){if(before===0&&after>0&&selected===today()){let m=state.meta;if(m.lastActiveDate===today())return;let streak=m.lastActiveDate===addDays(today(),-1)?m.streak+1:1;state.meta={streak,lastActiveDate:today(),maxStreak:Math.max(m.maxStreak||0,streak)}}}
function toggle(id){let cur=state.log[selected]||[],on=!cur.includes(id),next=on?cur.concat(id):cur.filter(x=>x!==id),amt=null;if(on){let vis=visibleIdsFor(selected),was=vis.length&&vis.every(x=>cur.includes(x)),now=vis.length&&vis.every(x=>next.includes(x));amt=id==="med"?COIN_MED:COIN_TASK;if(!was&&now)amt+=COIN_PERFECT}bumpStreak(cur.length,next.length);state.log[selected]=next;return amt}
function semStatus(){if(daysBetween(today(),SEM.start)>0){let n=daysBetween(today(),SEM.start);return"Semester starts in "+n+" day"+(n===1?"":"s")}if(daysBetween(today(),SEM.end)<0)return"Semester complete";if(daysBetween(SEM.breakStart,today())>=0&&daysBetween(today(),SEM.breakEnd)>=0)return"Mid-semester break";return"Semester · Week "+(Math.floor(daysBetween(SEM.start,today())/7)+1)}

function renderCalendar(){
  if(!calCursor) calCursor=selected.slice(0,7)+"-01";
  let monthStart=fromYmd(calCursor);
  let monthName=monthStart.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  let gridStart=weekStartOf(ymd(monthStart));

  ["M","T","W","T","F","S","S"].forEach(d=>html+=`<div class="cal-weekday">${d}</div>`);
  for(let i=0;i<42;i++){
    let d=addDays(gridStart,i), ids=visibleIdsFor(d), logs=state.log[d]||[];
    let done=ids.filter(x=>logs.includes(x)).length, pct=ids.length?Math.round(done/ids.length*100):0;

    html+=`<button class="cal-day ${out?"out":""} ${todayCls?"today":""} ${selectedCls?"selected":""}" data-act="calSelect" data-date="${d}"><span class="cal-num">${fromYmd(d).getDate()}</span><span class="cal-dots">${dots}</span><span class="cal-mini"><i style="width:${pct}%"></i></span></button>`;
  }

  let ws=weekStartOf(selected), weekDone=0, weekTotal=0, rows="";
  for(let i=0;i<7;i++){
    let d=addDays(ws,i), ids=visibleIdsFor(d), logs=state.log[d]||[], done=ids.filter(x=>logs.includes(x)).length;
    weekDone+=done; weekTotal+=ids.length;
    let status=dow(d)===0||dow(d)===6?"weekend":(!studyActiveFor(d)?"before semester":(daysBetween(SEM.breakStart,d)>=0&&daysBetween(d,SEM.breakEnd)>=0?"semester break":"study day"));

function nextDoseText(){

  return prettyShort(d);

function bindInputs(){let pd=document.getElementById("pdraft");if(pd)pd.addEventListener("change",e=>periodDraft=e.target.value);document.querySelectorAll("input.sq").forEach(inp=>inp.addEventListener("input",e=>{let id=inp.dataset.sq;state.sideQuests=state.sideQuests.map(q=>q.id===id?{id:q.id,label:e.target.value}:q);save()}))}
function fireAward(amt){let host=document.getElementById("levelcard");if(!host)return;let s=document.createElement("div");s.className="fx";s.textContent="+"+amt;host.appendChild(s);setTimeout(()=>s.remove(),950)}
document.getElementById("app").addEventListener("click",e=>{let t=e.target.closest("[data-act]");if(!t)return;let act=t.dataset.act;if(act==="tab"){tab=t.dataset.tab;if(tab==="calendar")calCursor=selected.slice(0,7)+"-01";render()}else if(act==="selday"){selected=t.dataset.date;render()}else if(act==="calSelect"){selected=t.dataset.date;calCursor=selected.slice(0,7)+"-01";tab="day";render()}else if(act==="calPrev"){let d=fromYmd(calCursor);d.setMonth(d.getMonth()-1);calCursor=ymd(d).slice(0,7)+"-01";render()}else if(act==="calNext"){let d=fromYmd(calCursor);d.setMonth(d.getMonth()+1);calCursor=ymd(d).slice(0,7)+"-01";render()}else if(act==="calToday"){selected=today();calCursor=selected.slice(0,7)+"-01";render()}else if(act==="weather"){let m=state.weather.mode;state.weather={mode:m==="clear"?"cloud":m==="cloud"?"rain":"clear",userSet:true,temp:state.weather.temp};save();applyBody();render()}else if(act==="reroll"){let cur=quoteRoll??0,n=cur;while(n===cur)n=Math.floor(Math.random()*QUOTES.length);quoteRoll=n;render()}else if(act==="spoons"){state.spoons=!state.spoons;save();render()}else if(act==="toggle"){let amt=toggle(t.dataset.id);save();render();if(amt)fireAward(amt)}else if(act==="toggleSq"){let amt=toggle(t.dataset.id);save();render();if(amt)fireAward(amt)}else if(act==="takeMorning"){selected=today();state.lastDose=today();let cur=state.log[today()]||[];if(!cur.includes("med")){bumpStreak(cur.length,cur.length+1);state.log[today()]=cur.concat("med");save();render();fireAward(COIN_MED)}}else if(act==="takeDose"){let mt=(state.log[selected]||[]).includes("med");state.lastDose=mt?addDays(selected,-DOSE_INTERVAL):selected;let amt=toggle("med");save();render();if(amt)fireAward(amt)}else if(act==="collapse"){let k=t.dataset.key;state.collapsed[k]=!state.collapsed[k];save();render()}else if(act==="pilates"){let i=state.pilates.indexOf(selected);if(i>=0)state.pilates.splice(i,1);else state.pilates.push(selected);save();render()}else if(act==="toggleWeek"){let wk=weekStartOf(selected),id=t.dataset.id,cur=state.weekly[wk]||[],had=cur.includes(id);state.weekly[wk]=had?cur.filter(x=>x!==id):cur.concat(id);save();render();if(!had)fireAward(10)}else if(act==="collapseAll"){let all=["morning","home","night","study","side"].every(k=>state.collapsed[k]);let v=!all;state.collapsed={morning:v,home:v,night:v,study:v,side:v};save();render()}else if(act==="clearDay"){state.log[selected]=[];save();render()}else if(act==="buy"){let id=t.dataset.id,th=THEMES[id],c=compute();if(!state.owned.includes(id)&&c.balance>=th.cost){state.spent+=th.cost;state.owned.push(id);state.active=id;save();applyTheme();applyBody();render()}}else if(act==="equip"){state.active=t.dataset.id;save();applyTheme();applyBody();render()}else if(act==="periodToday"){if(!state.periods.includes(today())){state.periods.push(today());save();render()}}else if(act==="periodDraft"){if(periodDraft&&!state.periods.includes(periodDraft)){state.periods.push(periodDraft);save();render()}}else if(act==="periodRemove"){state.periods=state.periods.filter(x=>x!==t.dataset.date);save();render()}});
function autoWeather(){if(state.weather.userSet||!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(pos=>{let url=`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=weather_code,temperature_2m&timezone=auto`;fetch(url).then(r=>r.json()).then(j=>{if(state.weather.userSet)return;let code=j?.current?.weather_code,temp=j?.current?.temperature_2m;if(typeof code==="number"){state.weather.mode=codeToScene(code);state.weather.temp=typeof temp==="number"?Math.round(temp):null;save();applyBody();render()}}).catch(()=>{})},()=>{},{timeout:4000})}
load();applyTheme();applyBody();render();autoWeather();setInterval(applyBody,300000);
})();
